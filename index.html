          const polyPoints = `${e.x},${ey} ${lx},${ly} ${rx},${ry}`;

          const t = 0.5;
          const bx = (1-t)**2 * s.x + 2*(1-t)*t*midX + t**2 * e.x;
          const by = (1-t)**2 * sy + 2*(1-t)*t*ctrlY + t**2 * ey;
          const arrowKey = `arrow-${m.id}`;
          const isDotted = dottedLines.has(arrowKey);
          
          return (
            <g key={m.id} className="arrow-group">
              <path d={path} fill="none" stroke="transparent" strokeWidth="15" style={{cursor: 'pointer', pointerEvents: 'stroke'}} onDoubleClick={(e) => { e.preventDefault(); e.stopPropagation(); toggleDottedLine(arrowKey); }} />
              {/* Linea sin marker-end */}
              <path d={path} fill="none" stroke="black" strokeWidth="1.5" opacity="0.8" strokeDasharray={isDotted ? "5,4" : "none"} style={{pointerEvents: 'none'}} />
              {/* Polígono dibujado manualmente */}
              <polygon points={polyPoints} fill="black" opacity="0.8" style={{pointerEvents: 'none'}} />
              
              <g className="arrow-delete-btn" onClick={() => setMoves(prev => prev.filter(x => x.id !== m.id))} transform={`translate(${bx-10},${by-10})`}>
                <rect width="20" height="20" fill="white" stroke="#e0ddd8" /><text x="10" y="15" textAnchor="middle" fontSize="14" fill="#dc2626">×</text>
              </g>
            </g>
          );
        });

        const phaseArcs = Array.from(phases).map(nodeId => {
          const nodeEl = container.querySelector(`[data-node-id="${nodeId}"]`);
          if (!nodeEl) return null;
          const labelEl = nodeEl.querySelector(':scope > .node-wrapper .node-content > .node-label .node-display');
          if (!labelEl) return null;

          const labelRect = labelEl.getBoundingClientRect();
          const x = (labelRect.left - rect.left) / zoomScale;
          const y = (labelRect.top - rect.top) / zoomScale;
          const width = labelRect.width / zoomScale;

          const padding = 14;
          const arcHeight = 15;
          const startX = x - padding;
          const startY = y + 5;
          const endX = x + width + padding;
          const endY = y + 5;
          const controlY = y - arcHeight;

          const path = `M ${startX} ${startY} Q ${x + width/2} ${controlY} ${endX} ${endY}`;
          const phaseKey = `phase-${nodeId}`;
          const isDotted = !dottedLines.has(phaseKey);

          return (
            <g key={phaseKey} className="phase-group">
              <path d={path} fill="none" stroke="transparent" strokeWidth="12" style={{cursor: 'pointer', pointerEvents: 'stroke'}} onDoubleClick={(e) => { e.preventDefault(); e.stopPropagation(); toggleDottedLine(phaseKey); }} />
              <path d={path} fill="none" stroke="black" strokeWidth="1.5" strokeDasharray={isDotted ? "5,3" : "none"} opacity="0.8" style={{pointerEvents: 'none'}} />
              <g className="arrow-delete-btn" onClick={() => togglePhase(nodeId)} transform={`translate(${x + width/2 - 10},${controlY - 18})`}>
                <rect width="20" height="20" fill="white" stroke="#e0ddd8" /><text x="10" y="15" textAnchor="middle" fontSize="14" fill="#dc2626">×</text>
              </g>
            </g>
          );
        });

        // --- Measure rendered tree bounds (in container coords) to size the scroll stage correctly ---
        try {
          let minLeft = Infinity, minTop = Infinity, maxRight = -Infinity, maxBottom = -Infinity;

          const nodesForBounds = container.querySelectorAll('[data-node-id]');
          nodesForBounds.forEach(nodeEl => {
            const wrapper = nodeEl.querySelector(':scope > .node-wrapper');
            if (wrapper) {
              const r = wrapper.getBoundingClientRect();
              minLeft = Math.min(minLeft, r.left);
              minTop = Math.min(minTop, r.top);
              maxRight = Math.max(maxRight, r.right);
              maxBottom = Math.max(maxBottom, r.bottom);
            }
            const tri = nodeEl.querySelector(':scope > .triangle-container');
            if (tri) {
              const tr = tri.getBoundingClientRect();
              minLeft = Math.min(minLeft, tr.left);
              minTop = Math.min(minTop, tr.top);
              maxRight = Math.max(maxRight, tr.right);
              maxBottom = Math.max(maxBottom, tr.bottom);
            }
          });

          if (minLeft !== Infinity) {
            const wScaled = Math.max(0, Math.ceil((maxRight - minLeft)));  // already includes zoom because rects are in CSS pixels
            const hScaled = Math.max(0, Math.ceil((maxBottom - minTop)));
            setContentSize({ w: wScaled, h: hScaled });
          } else {
            setContentSize({ w: 0, h: 0 });
          }
        } catch (err) {
          // In case of any DOM measurement issue, don't block rendering
        }
        // --- End bounds measurement ---

        // --- Render oval region highlights ---
        const HANDLE_R = 5;
        const ovalElements = ovals.map(oval => {
          const isSelected = selectedOvalId === oval.id;
          const labelY = oval.cy - oval.ry - 10;
          const handles = [
            { pos: 'n', x: oval.cx, y: oval.cy - oval.ry, cursor: 'n-resize' },
            { pos: 's', x: oval.cx, y: oval.cy + oval.ry, cursor: 's-resize' },
            { pos: 'e', x: oval.cx + oval.rx, y: oval.cy, cursor: 'e-resize' },
            { pos: 'w', x: oval.cx - oval.rx, y: oval.cy, cursor: 'w-resize' },
          ];
          return (
            <g key={oval.id} className="oval-group" style={{cursor: 'default'}}>
              {/* Visible ellipse */}
              <ellipse
                cx={oval.cx} cy={oval.cy} rx={oval.rx} ry={oval.ry}
                fill={oval.color + '12'} stroke={oval.color}
                strokeWidth={isSelected ? '2.8' : '2.2'}
                strokeDasharray={isSelected ? '6,3' : 'none'}
                opacity="0.85" style={{pointerEvents: 'none'}}
              />
              {/* Clickable fill for move / select */}
              <ellipse
                cx={oval.cx} cy={oval.cy} rx={oval.rx} ry={oval.ry}
                fill="transparent" stroke="transparent" strokeWidth="12"
                style={{pointerEvents: 'auto', cursor: isSelected ? 'move' : 'pointer'}}
                data-oval-action={isSelected ? 'move' : 'select'}
                data-oval-id={oval.id}
              />
              {/* Label */}
              {oval.label && (
                <text
                  x={oval.cx} y={labelY}
                  textAnchor="middle" fontSize="13" fontWeight="600"
                  fontFamily="'Source Sans 3', system-ui, sans-serif"
                  fill={oval.color} style={{pointerEvents: 'none'}}
                >
                  <tspan style={{paintOrder: 'stroke', stroke: 'white', strokeWidth: 1, strokeLinecap: 'round', strokeLinejoin: 'round'}}>{oval.label}</tspan>
                </text>
              )}
              {oval.label && (
                <text
                  x={oval.cx} y={labelY}
                  textAnchor="middle" fontSize="13" fontWeight="600"
                  fontFamily="'Source Sans 3', system-ui, sans-serif"
                  fill={oval.color} style={{pointerEvents: 'none'}}
                >{oval.label}</text>
              )}
              {/* Resize handles (only when selected) */}
              {isSelected && handles.map(h => (
                <circle
                  key={h.pos} cx={h.x} cy={h.y} r={HANDLE_R}
                  fill="white" stroke={oval.color} strokeWidth="2"
                  style={{cursor: h.cursor, pointerEvents: 'auto'}}
                  data-oval-action="resize" data-oval-handle={h.pos} data-oval-id={oval.id}
                />
              ))}
              {/* Delete button */}
              <g className="arrow-delete-btn"
                onClick={() => {
                  setOvals(prev => prev.filter(o => o.id !== oval.id));
                  if (selectedOvalId === oval.id) setSelectedOvalId(null);
                  if (editingOvalId === oval.id) { setEditingOvalId(null); setEditingOvalLabel(''); }
                }}
                transform={`translate(${oval.cx + oval.rx - 4},${oval.cy - oval.ry - 6})`}
              >
                <rect width="20" height="20" fill="white" stroke="#e0ddd8" rx="4" />
                <text x="10" y="15" textAnchor="middle" fontSize="14" fill="#dc2626">×</text>
              </g>
            </g>
          );
        });

        // --- Render drag preview oval ---
        const dragPreview = ovalAction && ovalAction.type === 'create' && ovalAction.currentX != null ? (() => {
          const cx = (ovalAction.startX + ovalAction.currentX) / 2;
          const cy = (ovalAction.startY + ovalAction.currentY) / 2;
          const rx = Math.abs(ovalAction.currentX - ovalAction.startX) / 2;
          const ry = Math.abs(ovalAction.currentY - ovalAction.startY) / 2;
          if (rx < 5 || ry < 5) return null;
          return (
            <ellipse
              key="drag-preview"
              cx={cx} cy={cy} rx={rx} ry={ry}
              fill={regionColor + '10'} stroke={regionColor} strokeWidth="2"
              strokeDasharray="6,4" opacity="0.7" style={{pointerEvents: 'none'}}
            />
          );
        })() : null;

        // --- Late Insertion elements ---
        const liElements = lateInsertions.map(li => {
          const isSelected = selectedLiId === li.id;
          const nodeIsRight = li.nodeX > li.x + li.w / 2;

          // Measure node text width to find edge
          const textHalfW = measureText(li.label || '...') / 2 + 4;

          // Arrow endpoints and spacing
          const GAP = 8;
          const RECT_ARROW_GAP = 10;
          const NODE_ARROW_GAP = 10;
          const HEAD_SHAFT_GAP = 0;
          const rectEdgeX = nodeIsRight ? li.x + li.w + GAP : li.x - GAP;
          const nodeEdgeX = nodeIsRight ? li.nodeX - textHalfW : li.nodeX + textHalfW;
          const arrowY = Math.min(Math.max(li.nodeY, li.y), li.y + li.h);

          // Arrowhead geometry
          const AH_LEN = 15;
          const AH_HALF = 7;

          const rectTipX = rectEdgeX + (nodeIsRight ? RECT_ARROW_GAP : -RECT_ARROW_GAP);
          const nodeTipX = nodeEdgeX + (nodeIsRight ? -NODE_ARROW_GAP : NODE_ARROW_GAP);
          const shaftStartX = rectTipX + (nodeIsRight ? AH_LEN + HEAD_SHAFT_GAP : -AH_LEN - HEAD_SHAFT_GAP);
          const shaftEndX = nodeTipX + (nodeIsRight ? -AH_LEN - HEAD_SHAFT_GAP : AH_LEN + HEAD_SHAFT_GAP);
          const showArrow = Math.abs(shaftEndX - shaftStartX) > 0.5;

          return (
            <g key={li.id} className="li-group">
              {/* Dashed rectangle */}
              <rect x={li.x} y={li.y} width={li.w} height={li.h}
                fill="none" stroke="#1a1a1a" strokeWidth={isSelected ? '2.2' : '1.5'}
                strokeDasharray="8,5" style={{pointerEvents: 'none'}} />
              {/* Invisible rect for interaction */}
              <rect x={li.x - 4} y={li.y - 4} width={li.w + 8} height={li.h + 8}
                fill="transparent" stroke="transparent" strokeWidth="8"
                style={{pointerEvents: 'auto', cursor: isSelected ? 'move' : 'pointer'}}
                data-li-action={isSelected ? 'move-rect' : 'select'} data-li-id={li.id} />
              {/* Double-headed arrow */}
              {showArrow && (
                <g style={{pointerEvents: 'none'}}>
                  {/* Double hollow shaft */}
                  {(() => {
                    const startX = shaftStartX;
                    const startY = arrowY;
                    const endX = shaftEndX;
                    const endY = li.nodeY;

                    const dx = endX - startX;
                    const dy = endY - startY;
                    const len = Math.hypot(dx, dy) || 1;

                    const px = -dy / len;
                    const py = dx / len;

                    const SHAFT_GAP = 3.2;

                    return (
                      <>
                        <line
                          x1={startX + px * SHAFT_GAP}
                          y1={startY + py * SHAFT_GAP}
                          x2={endX + px * SHAFT_GAP}
                          y2={endY + py * SHAFT_GAP}
                          stroke="#1a1a1a"
                          strokeWidth="1.6"
                        />
                        <line
                          x1={startX - px * SHAFT_GAP}
                          y1={startY - py * SHAFT_GAP}
                          x2={endX - px * SHAFT_GAP}
                          y2={endY - py * SHAFT_GAP}
                          stroke="#1a1a1a"
                          strokeWidth="1.6"
                        />
                      </>
                    );
                  })()}

                  {/* Hollow arrowhead at rect side */}
                  {(() => {
                    const tipX = rectTipX;
                    const tipY = arrowY;
                    const baseX = tipX + (nodeIsRight ? AH_LEN : -AH_LEN);
                    const topY = arrowY - AH_HALF;
                    const botY = arrowY + AH_HALF;

                    const OUTER_STROKE = 1.6;
                    const SHAFT_GAP = 3.2;
                    const CAP_GAP = 0.6;

                    const upperStop = tipY - SHAFT_GAP - CAP_GAP;
                    const lowerStart = tipY + SHAFT_GAP + CAP_GAP;

                    const INNER_INSET = 3.2;
                    const innerBaseX = tipX + (nodeIsRight ? AH_LEN - INNER_INSET : -AH_LEN + INNER_INSET);
                    const innerTopY = arrowY - (AH_HALF - INNER_INSET * 0.55);
                    const innerBotY = arrowY + (AH_HALF - INNER_INSET * 0.55);

                    return (
                      <>
                        <line
                          x1={tipX}
                          y1={tipY}
                          x2={baseX}
                          y2={topY}
                          stroke="#1a1a1a"
                          strokeWidth={OUTER_STROKE}
                          strokeLinecap="round"
                        />
                        <line
                          x1={tipX}
                          y1={tipY}
                          x2={baseX}
                          y2={botY}
                          stroke="#1a1a1a"
                          strokeWidth={OUTER_STROKE}
                          strokeLinecap="round"
                        />
                        <line
                          x1={baseX}
                          y1={topY}
                          x2={baseX}
                          y2={upperStop}
                          stroke="#1a1a1a"
                          strokeWidth={OUTER_STROKE}
                          strokeLinecap="round"
                        />
                        <line
                          x1={baseX}
                          y1={lowerStart}
                          x2={baseX}
                          y2={botY}
                          stroke="#1a1a1a"
                          strokeWidth={OUTER_STROKE}
                          strokeLinecap="round"
                        />

                        <line
                          x1={tipX}
                          y1={tipY}
                          x2={innerBaseX}
                          y2={innerTopY}
                          stroke="#1a1a1a"
                          strokeWidth="1.1"
                          strokeLinecap="round"
                        />
                        <line
                          x1={tipX}
                          y1={tipY}
                          x2={innerBaseX}
                          y2={innerBotY}
                          stroke="#1a1a1a"
                          strokeWidth="1.1"
                          strokeLinecap="round"
                        />
                      </>
                    );
                  })()}

                  {/* Hollow arrowhead at node side */}
                  {(() => {
                    const tipX = nodeTipX;
                    const tipY = li.nodeY;
                    const baseX = tipX + (nodeIsRight ? -AH_LEN : AH_LEN);
                    const topY = li.nodeY - AH_HALF;
                    const botY = li.nodeY + AH_HALF;

                    const OUTER_STROKE = 1.6;
                    const SHAFT_GAP = 3.2;
                    const CAP_GAP = 0.6;

                    const upperStop = tipY - SHAFT_GAP - CAP_GAP;
                    const lowerStart = tipY + SHAFT_GAP + CAP_GAP;

                    const INNER_INSET = 3.2;
                    const innerBaseX = tipX + (nodeIsRight ? -AH_LEN + INNER_INSET : AH_LEN - INNER_INSET);
                    const innerTopY = li.nodeY - (AH_HALF - INNER_INSET * 0.55);
                    const innerBotY = li.nodeY + (AH_HALF - INNER_INSET * 0.55);

                    return (
                      <>
                        <line
                          x1={tipX}
                          y1={tipY}
                          x2={baseX}
                          y2={topY}
                          stroke="#1a1a1a"
                          strokeWidth={OUTER_STROKE}
                          strokeLinecap="round"
                        />
                        <line
                          x1={tipX}
                          y1={tipY}
                          x2={baseX}
                          y2={botY}
                          stroke="#1a1a1a"
                          strokeWidth={OUTER_STROKE}
                          strokeLinecap="round"
                        />
                        <line
                          x1={baseX}
                          y1={topY}
                          x2={baseX}
                          y2={upperStop}
                          stroke="#1a1a1a"
                          strokeWidth={OUTER_STROKE}
                          strokeLinecap="round"
                        />
                        <line
                          x1={baseX}
                          y1={lowerStart}
                          x2={baseX}
                          y2={botY}
                          stroke="#1a1a1a"
                          strokeWidth={OUTER_STROKE}
                          strokeLinecap="round"
                        />

                        <line
                          x1={tipX}
                          y1={tipY}
                          x2={innerBaseX}
                          y2={innerTopY}
                          stroke="#1a1a1a"
                          strokeWidth="1.1"
                          strokeLinecap="round"
                        />
                        <line
                          x1={tipX}
                          y1={tipY}
                          x2={innerBaseX}
                          y2={innerBotY}
                          stroke="#1a1a1a"
                          strokeWidth="1.1"
                          strokeLinecap="round"
                        />
                      </>
                    );
                  })()}
                </g>
              )}
              {/* Node label text */}
              <text x={li.nodeX} y={li.nodeY + 5} textAnchor="middle" fontSize="20"
                fontFamily="'Crimson Pro', Georgia, serif" fill="#1a1a1a"
                style={{pointerEvents: 'auto', cursor: 'pointer'}}
                data-li-action="move-node" data-li-id={li.id}
              >{li.label}</text>
              {/* Delete button: visible on hover over any part of the LIM once editing is finished */}
              {editingLiId !== li.id && (
                <g className="arrow-delete-btn"
                  onClick={() => { setLateInsertions(prev => prev.filter(l => l.id !== li.id)); if (selectedLiId === li.id) setSelectedLiId(null); if (editingLiId === li.id) { setEditingLiId(null); setEditingLiLabel(''); } }}
                  transform={`translate(${li.nodeX + textHalfW + 4},${li.nodeY - 16})`}>
                  <rect width="20" height="20" fill="white" stroke="#e0ddd8" rx="4" />
                  <text x="10" y="15" textAnchor="middle" fontSize="14" fill="#dc2626">×</text>
                </g>
              )}
            </g>
          );
        });

        const liDragPreview = liAction && liAction.type === 'create' && liAction.currentX != null ? (() => {
          const x = Math.min(liAction.startX, liAction.currentX);
          const y = Math.min(liAction.startY, liAction.currentY);
          const w = Math.abs(liAction.currentX - liAction.startX);
          const h = Math.abs(liAction.currentY - liAction.startY);
          if (w < 5 || h < 5) return null;
          return <rect key="li-drag-preview" x={x} y={y} width={w} height={h}
            fill="none" stroke="#1a1a1a" strokeWidth="1.5" strokeDasharray="8,5" opacity="0.5" style={{pointerEvents: 'none'}} />;
        })() : null;

        setSvgLines(<>{ovalElements}{dragPreview}{liElements}{liDragPreview}{lines}{arrows}{phaseArcs}</>);
      }, [tree, moves, phases, dottedLines, ovals, lateInsertions, liAction, ovalAction, selectedOvalId, selectedLiId, editingOvalId, editingLiId, regionColor, zoomLevel]);

      drawRef.current = draw;

      useLayoutEffect(() => { draw(); }, [tree, moves, phases, dottedLines, ovals, lateInsertions, liAction, ovalAction, selectedOvalId, selectedLiId, zoomLevel, draw]);
      useEffect(() => { window.addEventListener('resize', draw); return () => window.removeEventListener('resize', draw); }, [draw]);

      const load = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            isUndoRedo.current = true;
            setTree(normalizeNode(data.tree || data));
            setMoves(data.moves || []);
            setPhases(new Set(data.phases || []));
            setDottedLines(new Set(data.dottedLines || []));
            setOvals(data.ovals || []);
            setLateInsertions(data.lateInsertions || []);
            setHistory([]);
            setHistoryIndex(-1);
            localStorage.removeItem('kilmer-autosave');
            setLastSaved(null);
            setTimeout(() => { isUndoRedo.current = false; }, 0);
          } catch(err) { alert("Invalid JSON file"); }
        };
        reader.readAsText(file);
        e.target.value = "";
      };

      const handleExportPNG = async () => {
        const filename = (prompt('Enter filename:', 'syntax_tree') || 'syntax_tree').replace(/\s+/g, '_');
        if (!filename) return;

        // ═══════════════════════════════════════════════════════════════
        // COMPOSITE EXPORT v4
        //
        // Renders HTML (via html2canvas) and SVG (via XMLSerializer+Image)
        // as separate layers, composited on a single canvas.
        //
        // KEY FIX: The clone uses position:static to eliminate ALL
        // inherited positioning artifacts. Wrapper padding positions it.
        // Clone width is locked to the original's measured width so
        // internal flex/flow layout matches the SVG coordinates exactly.
        // ═══════════════════════════════════════════════════════════════

        const DEBUG_EXPORT = false;
        const SCALE = 3;
        const PAD = 40;

        // ── 1. Force zoom=100, wait for complete layout ──
        const savedZoom = zoomLevel;
        setZoomLevel(100);
        await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
        await new Promise(r => setTimeout(r, 200));

        const el = zoomContainerRef.current;
        if (!el) { setZoomLevel(savedZoom); return; }

        // ── 2. Measure ORIGINAL before cloning ──
        const origW = el.offsetWidth;
        const origH = el.offsetHeight;

        // ── 3. Clone with computed styles ──
        const copyCS = (src, tgt, skipBorder = false) => {
          const cs = window.getComputedStyle(src);
          for (let i = 0; i < cs.length; i++) {
            const p = cs[i];
            if (skipBorder && (p.startsWith('border') || p === 'box-shadow' || p === 'outline')) continue;
            tgt.style.setProperty(p, cs.getPropertyValue(p));
          }
        };
        const cloneDeep = (element) => {
          const cl = element.cloneNode(false);
          copyCS(element, cl, !!(element.classList && element.classList.contains('sublabel-pill')));
          for (const ch of element.childNodes) {
            cl.appendChild(ch.nodeType === Node.ELEMENT_NODE ? cloneDeep(ch) : ch.cloneNode(true));
          }
          return cl;
        };

        const clone = cloneDeep(el);
        setZoomLevel(savedZoom);

        // ── 4. Clean up UI-only elements ──
        clone.querySelectorAll('.node-actions, .arrow-delete-btn').forEach(x => x.remove());
        clone.querySelectorAll('[data-oval-handle]').forEach(x => x.remove());
        clone.querySelectorAll('[data-oval-action]').forEach(x => x.remove());
        clone.querySelectorAll('[data-li-action]').forEach(x => { if (x.getAttribute('fill') === 'transparent') x.remove(); });
        clone.querySelectorAll('.oval-group ellipse').forEach(e => {
          e.removeAttribute('stroke-dasharray');
          e.style.strokeDasharray = 'none';
        });
        clone.querySelectorAll('.pill-x').forEach(x => x.remove());
        clone.querySelectorAll('.sublabel-pill').forEach(pill => {
          pill.style.border = 'none'; pill.style.borderWidth = '0'; pill.style.borderStyle = 'none';
          pill.style.borderRadius = '0'; pill.style.background = 'transparent';
          pill.style.backgroundColor = 'transparent'; pill.style.padding = '0';
          pill.style.boxShadow = 'none'; pill.style.outline = 'none';
          pill.style.display = 'flex'; pill.style.alignItems = 'center'; pill.style.justifyContent = 'center';
        });

        // ── 5. CRITICAL: Nuke ALL positioning on clone ──
        clone.style.position = 'static';
        clone.style.left = 'auto';
        clone.style.right = 'auto';
        clone.style.top = 'auto';
        clone.style.bottom = 'auto';
        clone.style.inset = 'auto';
        clone.style.transform = 'none';
        clone.style.webkitTransform = 'none';
        clone.style.margin = '0';
        // Lock dimensions to match original layout
        clone.style.width = origW + 'px';
        clone.style.minWidth = origW + 'px';
        clone.style.maxWidth = origW + 'px';
        clone.style.height = 'auto';
        clone.style.minHeight = origH + 'px';
        clone.style.overflow = 'visible';

        // ── 6. Compute content bounds (from ovals + tree knowledge) ──
        let minX = 0, minY = 0, maxX = origW, maxY = origH;

        for (const o of ovals) {
          minX = Math.min(minX, o.cx - o.rx - 8);
          minY = Math.min(minY, o.cy - o.ry - (o.label ? 30 : 8));
          maxX = Math.max(maxX, o.cx + o.rx + 8);
          maxY = Math.max(maxY, o.cy + o.ry + 8);
        }

        // ── 7. Place clone in DOM for measurement + arrowhead baking ──
        const offsetX = -minX + PAD;
        const offsetY = -minY + PAD;
        const totalW = (maxX - minX) + PAD * 2;
        const totalH = (maxY - minY) + PAD * 2;

        const wrapper = document.createElement('div');
        wrapper.style.cssText = `
          position: fixed; left: 0; top: 0; z-index: -9999;
          pointer-events: none; background: transparent;
          width: ${totalW}px; height: ${totalH}px;
          padding: 0; margin: 0; overflow: hidden;
          box-sizing: content-box;
        `;

        const spacer = document.createElement('div');
        spacer.style.cssText = `
          margin: 0; padding: ${offsetY}px 0 0 ${offsetX}px;
          width: ${origW}px;
        `;
        spacer.appendChild(clone);
        wrapper.appendChild(spacer);
        document.body.appendChild(wrapper);
        await new Promise(r => setTimeout(r, 120));

        // ── 8. Bake arrowheads ──
        const svgEl = clone.querySelector('svg');
        if (svgEl) {
          svgEl.querySelectorAll('path[marker-end]').forEach(path => {
            try {
              if (!path.ownerSVGElement || !path.getTotalLength) return;
              const len = path.getTotalLength();
              if (!isFinite(len) || len <= 0) return;
              const pe = path.getPointAtLength(len);
              const pp = path.getPointAtLength(Math.max(0, len - 8));
              const ang = Math.atan2(pe.y - pp.y, pe.x - pp.x);
              const hL = 12, hW = 8;
              const bx = pe.x - hL * Math.cos(ang), by = pe.y - hL * Math.sin(ang);
              const lx = bx + (hW/2)*Math.cos(ang+Math.PI/2), ly = by + (hW/2)*Math.sin(ang+Math.PI/2);
              const rx = bx + (hW/2)*Math.cos(ang-Math.PI/2), ry = by + (hW/2)*Math.sin(ang-Math.PI/2);
              const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
              poly.setAttribute('points', `${pe.x},${pe.y} ${lx},${ly} ${rx},${ry}`);
              poly.setAttribute('fill', path.getAttribute('stroke') || path.style.stroke || '#000');
              poly.setAttribute('stroke', 'none');
              poly.setAttribute('opacity', path.getAttribute('opacity') || path.style.opacity || '1');
              path.parentNode.appendChild(poly);
              path.removeAttribute('marker-end');
            } catch (_) {}
          });
        }

        // ── 9. Measure actual bounds from the placed clone ──
        await new Promise(r => requestAnimationFrame(r));
        const cloneRect = clone.getBoundingClientRect();
        const wrapperRect = wrapper.getBoundingClientRect();

        const actualCloneX = cloneRect.left - wrapperRect.left;
        const actualCloneY = cloneRect.top - wrapperRect.top;

        let svgMinX = 0, svgMinY = 0, svgMaxX = origW, svgMaxY = origH;
        if (svgEl) {
          svgEl.querySelectorAll('path, ellipse, polygon, line, polyline, circle, text').forEach(el => {
            try {
              if (el.getAttribute('fill') === 'transparent' && el.getAttribute('stroke') === 'transparent') return;
              const b = el.getBBox();
              if (b.width === 0 && b.height === 0) return;
              svgMinX = Math.min(svgMinX, b.x);
              svgMinY = Math.min(svgMinY, b.y);
              svgMaxX = Math.max(svgMaxX, b.x + b.width);
              svgMaxY = Math.max(svgMaxY, b.y + b.height);
            } catch(_) {}
          });
        }

        const finalMinX = Math.min(minX, svgMinX);
        const finalMinY = Math.min(minY, svgMinY);
        const finalMaxX = Math.max(maxX, svgMaxX);
        const finalMaxY = Math.max(maxY, svgMaxY);
        const finalTotalW = (finalMaxX - finalMinX) + PAD * 2;
        const finalTotalH = (finalMaxY - finalMinY) + PAD * 2;
        const finalOffsetX = -finalMinX + PAD;
        const finalOffsetY = -finalMinY + PAD;

        wrapper.style.width = finalTotalW + 'px';
        wrapper.style.height = finalTotalH + 'px';
        spacer.style.padding = `${finalOffsetY}px 0 0 ${finalOffsetX}px`;
        await new Promise(r => setTimeout(r, 50));

        const finalCloneRect = clone.getBoundingClientRect();
        const finalWrapperRect = wrapper.getBoundingClientRect();
        const measuredOffX = finalCloneRect.left - finalWrapperRect.left;
        const measuredOffY = finalCloneRect.top - finalWrapperRect.top;

        if (DEBUG_EXPORT) {
          console.group('🔍 Kilmer Export Debug v4');
          console.log('savedZoom:', savedZoom, '| origW:', origW, 'origH:', origH);
          console.log('cloneRect:', {w: finalCloneRect.width.toFixed(0), h: finalCloneRect.height.toFixed(0)});
          console.log('intended offset:', {x: finalOffsetX.toFixed(0), y: finalOffsetY.toFixed(0)});
          console.log('MEASURED offset:', {x: measuredOffX.toFixed(1), y: measuredOffY.toFixed(1)});
          console.log('bounds:', {minX: finalMinX.toFixed(0), minY: finalMinY.toFixed(0), maxX: finalMaxX.toFixed(0), maxY: finalMaxY.toFixed(0)});
          console.log('canvas:', {w: finalTotalW.toFixed(0), h: finalTotalH.toFixed(0)});
          console.log('ovals:', ovals.length);
        }

        // ── 10. Rasterize SVG layer ──
        let svgImg = null;
        if (svgEl) {
          const svgClone = svgEl.cloneNode(true);
          svgClone.querySelectorAll('ellipse[fill="transparent"][stroke="transparent"]').forEach(e => e.remove());

          svgClone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
          svgClone.setAttribute('viewBox', `${-measuredOffX} ${-measuredOffY} ${finalTotalW} ${finalTotalH}`);
          svgClone.setAttribute('width', Math.round(finalTotalW * SCALE));
          svgClone.setAttribute('height', Math.round(finalTotalH * SCALE));
          svgClone.removeAttribute('style');
          svgClone.style.overflow = 'visible';

          const fontStyle = document.createElementNS('http://www.w3.org/2000/svg', 'style');
          fontStyle.textContent = `@import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');`;
          svgClone.insertBefore(fontStyle, svgClone.firstChild);

          const svgString = new XMLSerializer().serializeToString(svgClone);
          const svgBlob = new Blob([svgString], {type: 'image/svg+xml;charset=utf-8'});
          const svgUrl = URL.createObjectURL(svgBlob);

          try {
            svgImg = await new Promise((resolve) => {
              const img = new Image();
              img.onload = () => resolve(img);
              img.onerror = () => { console.warn('SVG rasterize failed'); resolve(null); };
              img.src = svgUrl;
            });
          } finally {
            URL.revokeObjectURL(svgUrl);
          }

          if (DEBUG_EXPORT) console.log('SVG:', svgImg ? `✅ ${svgImg.naturalWidth}×${svgImg.naturalHeight}` : '❌');
        }

        // ── 11. Render HTML layer (SVG removed) ──
        if (svgEl) svgEl.remove();
        await new Promise(r => setTimeout(r, 50));

        let htmlCanvas;
        try {
          htmlCanvas = await html2canvas(wrapper, {
            backgroundColor: null,
            scale: SCALE,
            useCORS: true,
            logging: false,
          });
        } catch(err) {
          console.error('html2canvas failed:', err);
          document.body.removeChild(wrapper);
          return;
        }

        if (DEBUG_EXPORT) console.log('HTML:', htmlCanvas.width, '×', htmlCanvas.height);

        // ── 12. Composite ──
        const finalPxW = Math.round(finalTotalW * SCALE);
        const finalPxH = Math.round(finalTotalH * SCALE);
        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = finalPxW;
        finalCanvas.height = finalPxH;
        const ctx = finalCanvas.getContext('2d');

        ctx.drawImage(htmlCanvas, 0, 0, finalPxW, finalPxH);
        if (svgImg) ctx.drawImage(svgImg, 0, 0, finalPxW, finalPxH);

        if (DEBUG_EXPORT) {
          console.log('Final:', finalPxW, '×', finalPxH);
          console.groupEnd();
          const dbg = document.createElement('div');
          dbg.style.cssText = `position:fixed;left:10px;top:10px;z-index:99999;
            background:#fff;border:2px solid red;padding:12px;border-radius:8px;
            font:12px monospace;max-width:450px;box-shadow:0 4px 20px rgba(0,0,0,0.3);`;
          dbg.innerHTML = `
            <b style="color:red;">Export Debug v4</b><br>
            origW: ${origW} | cloneW: ${finalCloneRect.width.toFixed(0)}<br>
            intended offset: (${finalOffsetX.toFixed(0)}, ${finalOffsetY.toFixed(0)})<br>
            <b>MEASURED offset: (${measuredOffX.toFixed(1)}, ${measuredOffY.toFixed(1)})</b><br>
            bounds: (${finalMinX.toFixed(0)},${finalMinY.toFixed(0)})→(${finalMaxX.toFixed(0)},${finalMaxY.toFixed(0)})<br>
            canvas: ${finalTotalW.toFixed(0)}×${finalTotalH.toFixed(0)}<br>
            SVG viewBox: ${-measuredOffX.toFixed(1)} ${-measuredOffY.toFixed(1)} ${finalTotalW.toFixed(0)} ${finalTotalH.toFixed(0)}<br>
            SVG: ${svgImg ? '✅' : '❌'} | HTML: ${htmlCanvas.width}×${htmlCanvas.height}<br>
            <img src="${finalCanvas.toDataURL('image/png')}" style="max-width:420px;border:1px solid #ccc;margin-top:6px;"/>
          `;
          document.body.appendChild(dbg);
          setTimeout(() => dbg.remove(), 12000);
        }

        // ── 13. Download ──
        try {
          const a = document.createElement('a');
          a.download = `${filename}.png`;
          a.href = finalCanvas.toDataURL('image/png');
          a.click();
        } finally {
          document.body.removeChild(wrapper);
        }
      };

      return (
        <div className="container">
          <header className="header">
            <img src={LOGO_URL} alt="Kilmer" className="header-logo" onError={e => e.target.style.display='none'} />
          </header>

          <div className="top-bar" style={{display:'none'}}>
            {/* top-bar removed – controls moved to left panel */}
          </div>

          <div className="workspace">

            {/* Left panel — unified controls */}
            <div className="left-panel">

              {/* General */}
              <div className="panel-section">

                <button className="panel-btn primary" onClick={() => {setTree({id: generateId(), label: '...', children: null, triangleText: null, sublabels: [], terminalLocked: false}); setMoves([]); setPhases(new Set()); setDottedLines(new Set()); setOvals([]); setLateInsertions([]); setHistory([]); setHistoryIndex(-1); localStorage.removeItem('kilmer-autosave'); setLastSaved(null);}}>
                  <span className="pb-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path><path d="M5 3v4"></path><path d="M19 17v4"></path><path d="M3 5h4"></path><path d="M17 19h4"></path></svg></span>New Tree
                </button>
                <button className="panel-btn" onClick={() => window.open('manual.html', '_blank')}>
                  <span className="pb-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg></span>Manual
                </button>
              </div>

              {/* Files */}
              <div className="panel-section">
                <div className="panel-section-label">Files</div>
                <button className="panel-btn" onClick={() => fileRef.current.click()}>
                  <span className="pb-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg></span>Load Project
                </button>
                <input type="file" ref={fileRef} style={{display:'none'}} accept=".json,.kilmer,application/json,text/plain" onChange={load} />
                <button className="panel-btn" onClick={saveTree} disabled={!tree} title="Save (Ctrl+S)">
                  <span className="pb-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg></span>Save Project
                </button>
                <button className="panel-btn" onClick={handleExportPNG} disabled={!tree}>
                  <span className="pb-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg></span>Download as Image
                </button>
              </div>

              {/* Building direction */}
              <div className="panel-section">
                <div className="panel-section-label">Building direction</div>
                <button className={`panel-btn ${buildMode === 'topdown' ? 'dir-active' : ''}`} onClick={() => setBuildMode('topdown')} title="Top-down">
                  <span className="pb-icon">↧</span>Top-down
                </button>
                <button className={`panel-btn ${buildMode === 'bottomup' ? 'dir-active' : ''}`} onClick={() => setBuildMode('bottomup')} title="Bottom-up">
                  <span className="pb-icon">↥</span>Bottom-up
                </button>
              </div>

              {/* Tools */}
              <div className="panel-section">
                <div className="panel-section-label">Tools</div>
                <button className={`panel-btn ${isMoveMode ? 'active-mode' : ''}`} onClick={() => {setIsMoveMode(!isMoveMode); setIsPhaseMode(false); setIsRegionMode(false); setIsLateInsertionMode(false); setSourceId(null);}} disabled={!tree} title="Move">
                  <span className="pb-icon">⤳</span>Move
                </button>
                <button className={`panel-btn ${isPhaseMode ? 'active-mode' : ''}`} onClick={() => {setIsPhaseMode(!isPhaseMode); setIsMoveMode(false); setIsRegionMode(false); setIsLateInsertionMode(false); setSourceId(null);}} disabled={!tree} title="Phase">
                  <span className="pb-icon">◠</span>Phase
                </button>
                <button className={`panel-btn ${isLateInsertionMode ? 'active-mode' : ''}`} onClick={() => {setIsLateInsertionMode(!isLateInsertionMode); setIsMoveMode(false); setIsPhaseMode(false); setIsRegionMode(false); setSourceId(null); if (isLateInsertionMode) { setSelectedLiId(null); setLiAction(null); }}} disabled={!tree} title="Late Insertion">
                  <span className="pb-icon">⇔</span>Late Insertion
                </button>
                <div className="highlight-popover-wrapper" style={{width:'100%'}}>
                  <button
                    className={`panel-btn ${isRegionMode ? 'active-mode' : ''}`}
                    style={isRegionMode ? {background: regionColor, borderColor: regionColor} : undefined}
                    onClick={() => {
                      const wasOn = isRegionMode;
                      setIsRegionMode(!wasOn);
                      setIsMoveMode(false); setIsPhaseMode(false); setIsLateInsertionMode(false); setSourceId(null);
                      if (wasOn) { setSelectedOvalId(null); setHighlightPopoverOpen(false); }
                    }}
                    disabled={!tree}
                    title="Draw oval highlights"
                  >
                    <span className="pb-icon">⬭</span>
                    <span style={{flex:1}}>Highlight</span>
                    {isRegionMode && (
                      <span style={{fontSize:'12px', opacity:0.9}} onClick={(e) => { e.stopPropagation(); setHighlightPopoverOpen(p => !p); }}>▾</span>
                    )}
                  </button>
                  {isRegionMode && highlightPopoverOpen && (
                    <div className="highlight-popover-panel">
                      {OVAL_COLORS.map(c => (
                        <span
                          key={c}
                          className={`oval-color-dot ${regionColor === c ? 'active' : ''}`}
                          style={{background: c}}
                          onClick={() => { setRegionColor(c); setHighlightPopoverOpen(false); }}
                        />
                      ))}
                    </div>
                  )}
                </div>
              </div>

              {/* History */}
              <div className="panel-section">
                <div className="panel-section-label">History</div>
                <button className="panel-btn" onClick={undo} disabled={!canUndo} title="Undo (Ctrl+Z)">
                  <span className="pb-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg></span>Undo
                </button>
                <button className="panel-btn" onClick={redo} disabled={!canRedo} title="Redo (Ctrl+Y)">
                  <span className="pb-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 7v6h-6"></path><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"></path></svg></span>Redo
                </button>
              </div>

            </div>{/* end left-panel */}

            {/* Main content area */}
            <div className="workspace-main">

          {/* Mode Status Bar */}
          {isMoveMode && (
            <div className="mode-status-bar">
              <span className="status-icon">⤳</span>
              {sourceId ? (
                <>
                  <span>Click the <strong>target node</strong> to create movement arrow</span>
                  <span className="status-step">Step 2/2</span>
                </>
              ) : (
                <>
                  <span>Click the <strong>source node</strong> (e.g., trace, copy)</span>
                  <span className="status-step">Step 1/2</span>
                </>
              )}
              <button onClick={() => {setIsMoveMode(false); setSourceId(null);}}>Cancel (Esc)</button>
            </div>
          )}
          {isPhaseMode && (
            <div className="mode-status-bar">
              <span className="status-icon">◠</span>
              <span>Click a <strong>phase head</strong> (e.g., vP, CP) to mark phase boundary</span>
              <button onClick={() => setIsPhaseMode(false)}>Cancel (Esc)</button>
            </div>
          )}
          {isRegionMode && (
            <div className="mode-status-bar">
              <span className="status-icon">⬭</span>
              <span><strong>Drag</strong> to draw · Click oval to edit label/move · Drag handle to resize</span>
              <button onClick={() => { setIsRegionMode(false); setOvalAction(null); setSelectedOvalId(null); setHighlightPopoverOpen(false); }}>Finish (Esc)</button>
            </div>
          )}
          {isLateInsertionMode && (
            <div className="mode-status-bar">
              <span className="status-icon">⇔</span>
              <span><strong>Drag</strong> to draw dashed rectangle · Click node to edit label · Drag node or rectangle to reposition</span>
              <button onClick={() => { setIsLateInsertionMode(false); setLiAction(null); setSelectedLiId(null); }}>Finish (Esc)</button>
            </div>
          )}

          <div className="tree-canvas" ref={canvasRef}
            style={(isRegionMode || isLateInsertionMode) ? {cursor: 'crosshair'} : undefined}
            onMouseDown={(e) => { if (isRegionMode) handleCanvasMouseDown(e); else if (isLateInsertionMode) handleLIMouseDown(e); }}
            onMouseMove={(e) => { if (isRegionMode) handleCanvasMouseMove(e); else if (isLateInsertionMode) handleLIMouseMove(e); }}
            onMouseUp={(e) => { if (isRegionMode) handleCanvasMouseUp(e); else if (isLateInsertionMode) handleLIMouseUp(e); }}
            onMouseLeave={(e) => { if (isRegionMode) handleCanvasMouseUp(e); else if (isLateInsertionMode) handleLIMouseUp(e); }}
          >
            {/* Oval label editing input */}
            {editingOvalId && (() => {
              const oval = ovals.find(o => o.id === editingOvalId);
              if (!oval || !zoomContainerRef.current) return null;
              const container = zoomContainerRef.current;
              const rect = container.getBoundingClientRect();
              const zoomScale = zoomLevel / 100;
              const screenX = rect.left + oval.cx * zoomScale;
              const screenY = rect.top + (oval.cy - oval.ry - 18) * zoomScale;
              return (
                <input
                  ref={ovalLabelInputRef}
                  className="oval-label-input"
                  style={{ left: screenX, top: screenY, transform: 'translate(-50%, -100%)' }}
                  value={editingOvalLabel}
                  placeholder="Label (optional)"
                  onChange={e => setEditingOvalLabel(e.target.value)}
                  onBlur={commitOvalLabel}
                  onKeyDown={e => {
                    if (e.key === 'Enter') { e.currentTarget.blur(); }
                    if (e.key === 'Escape') { setEditingOvalId(null); setEditingOvalLabel(''); }
                  }}
                />
              );
            })()}
            {/* Late Insertion label editing input */}
            {editingLiId && (() => {
              const li = lateInsertions.find(l => l.id === editingLiId);
              if (!li || !zoomContainerRef.current) return null;
              const container = zoomContainerRef.current;
              const rect = container.getBoundingClientRect();
              const zoomScale = zoomLevel / 100;
              const screenX = rect.left + li.nodeX * zoomScale;
              const screenY = rect.top + li.nodeY * zoomScale;
              return (
                <div style={{position: 'fixed', left: screenX, top: screenY, transform: 'translate(-50%, -50%)', zIndex: 9999, display: 'flex', gap: '4px', alignItems: 'center'}}>
                  <input
                    ref={(el) => { liLabelInputRef.current = el; activeEditInputRef.current = el; }}
                    className="oval-label-input"
                    style={{ position: 'static', transform: 'none', minWidth: '80px' }}
                    value={editingLiLabel}
                    placeholder="Label"
                    onChange={e => setEditingLiLabel(e.target.value)}
                    onBlur={commitLiLabel}
                    onKeyDown={e => {
                      if (e.key === 'Enter') { e.currentTarget.blur(); }
                      if (e.key === 'Escape') { setEditingLiId(null); setEditingLiLabel(''); }
                    }}
                  />
                  <button
                    type="button"
                    className={`action-btn li-special-btn ${showIPAToolbar ? 'active' : ''}`}
                    onMouseDown={(e) => { e.preventDefault(); e.stopPropagation(); }}
                    onClick={(e) => { e.preventDefault(); e.stopPropagation(); toggleIPAPanel(e.currentTarget); }}
                    title="Insert special character"
                  >Ω</button>
                </div>
              );
            })()}
            <div className={`zoom-controls ${tree ? 'visible' : ''}`}>
              <button className="zoom-btn" onClick={zoomOut} disabled={zoomLevel <= ZOOM_MIN} title="Zoom out (Ctrl/⌘ + −)">−</button>
              <div className="zoom-indicator" onClick={zoomReset} title="Reset zoom (Ctrl/⌘ + 0)">{zoomLevel}%</div>
              <button className="zoom-btn" onClick={zoomIn} disabled={zoomLevel >= ZOOM_MAX} title="Zoom in (Ctrl/⌘ + +)">+</button>
            </div>

            {showIPAToolbar && (
              <div
                ref={ipaPanelRef}
                className="ipa-panel ipa-panel-portal"
                onMouseDown={(e) => { e.preventDefault(); e.stopPropagation(); }}
              >
                {IPA_CATEGORIES.map(cat => (
                  <div key={cat.name} className="ipa-cat">
                    <div className="ipa-cat-title">{cat.name}</div>
                    <div className="ipa-grid">
                      {cat.chars.map(ch => (
                        <button
                          key={ch}
                          className="ipa-char-btn"
                          type="button"
                          onMouseDown={(e) => { e.preventDefault(); e.stopPropagation(); }}
                          onClick={() => insertIPAIntoActiveInput(ch)}
                        >
                          {ch}
                        </button>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Auto-save indicator - top left corner */}
            <div className={`autosave-indicator ${(isSaving || lastSaved) && tree ? 'visible' : ''}`}>
              {isSaving && (
                <span style={{display: 'flex', alignItems: 'center', gap: '4px'}}>
                  <span style={{animation: 'pulse 1.5s ease-in-out infinite'}}>☁</span> Saving...
                </span>
              )}
              {!isSaving && lastSaved && (
                <span>✓ Auto-saved {formatTimeAgo(lastSaved)}</span>
              )}
            </div>

            <div className="zoom-wrapper" style={{ width: stageW, height: stageH }}>
              <div className="zoom-stage" style={{ width: stageW, height: stageH }}>
              <div className="zoom-container" ref={zoomContainerRef} style={{ transform: `translateX(-50%) scale(${zoomLevel / 100})`, transformOrigin: 'top center' }}>
                <svg width={svgW} height={svgH} style={{position:'absolute', top:0, left:0, pointerEvents:'none', zIndex:1, overflow:'visible'}}>{svgLines}</svg>
                {tree ? <TreeNode node={tree} isRoot={true} {...{updateNode, addNode, addParent, buildMode, toggleTri, addSublabel, updateSublabel, removeSublabel, addTriangleSublabel, updateTriangleSublabel, removeTriangleSublabel, delNode, isMoveMode, isPhaseMode, isRegionMode, sourceId, onEditStart, onEditEnd, isEditingNode, showIPAToolbar, toggleIPAPanel, insertIPAIntoActiveInput, onNodeClick: (id) => {
                  if (!sourceId) setSourceId(id);
                  else if (sourceId === id) setSourceId(null);
                  else {
                    const newMoveId = generateId();
                    setMoves(p => [...p, {id: newMoveId, from: sourceId, to: id}]);
                    // Make movement arrows dotted by default
                    setDottedLines(prev => {
                      const s = new Set(prev);
                      s.add(`arrow-${newMoveId}`);
                      return s;
                    });
                    setSourceId(null);
                    setIsMoveMode(false);
                  }
                }, onPhaseClick: (id) => { togglePhase(id); setIsPhaseMode(false); }}} /> : <div style={{color:'#999'}}>Click <strong>New Tree</strong> to start a new diagram or <strong>Load</strong> to edit a previously saved one.</div>}
              </div>
              </div>
            </div>
          </div>

            </div>{/* end workspace-main */}

          </div>{/* end workspace */}

          <div className="instructions-panel">
            <button className="instructions-header" onClick={() => setShowInstructions(prev => !prev)}>
              <span>Quick Guide</span>
              <span className={`collapse-icon ${showInstructions ? 'expanded' : ''}`}>›</span>
            </button>
            {showInstructions && (
              <div className="instructions-grid">

              {/* ── Text Formatting ── */}
              <div className="instruction-card text-formatting-card">
                <h4><span className="icon"><i>A</i></span> Text Formatting</h4>
                <div className="formatting-columns">
                  <ul>
                    <li><code>**text**</code> <span class="example"><span class="arrow">→</span> <span class="result"><b>bold</b></span></span></li>
                    <li><code>*text*</code> <span class="example"><span class="arrow">→</span> <span class="result"><i>italics</i></span></span></li>
                    <li><code>X_i</code> or <code>X_i_</code> <span class="example"><span class="arrow">→</span> <span class="result">X<sub>i</sub></span></span></li>
                    <li><code>X__n</code> or <code>X__n__</code> <span class="example"><span class="arrow">→</span> <span class="result">X<sup>n</sup></span></span></li>
                    <li><code>#X#</code> <span class="example"><span class="arrow">→</span> <span class="result"><span class="overline">X</span></span></span></li>
                    <li><code>##X##</code> <span class="example"><span class="arrow">→</span> <span class="result"><span class="double-overline">X</span></span></span></li>
                    <li><code>=X=</code> <span class="example"><span class="arrow">→</span> <span class="result"><s>X</s></span></span></li>
                  </ul>
                  <ul>
                    <li className="combining-header">Styles can be combined:</li>
                    <li><code>**X**_i_</code> <span class="example"><span class="arrow">→</span> <span class="result"><b>X</b><sub>i</sub></span></span></li>
                    <li><code>*X*_i_</code> <span class="example"><span class="arrow">→</span> <span class="result"><i>X</i><sub>i</sub></span></span></li>
                    <li><code>X__*n*__</code> <span class="example"><span class="arrow">→</span> <span class="result">X<sup><i>n</i></sup></span></span></li>
                    <li><code>#*XP*#</code> <span class="example"><span class="arrow">→</span> <span class="result"><span class="overline"><i>XP</i></span></span></span></li>
                    <li><code>=*t*_i_=</code> <span class="example"><span class="arrow">→</span> <span class="result"><s><i>t</i><sub>i</sub></s></span></span></li>
                  </ul>
                </div>
              </div>

              {/* ── Node toolbar icons ── */}
              <div className="instruction-card">
                <h4><span className="icon">⑃</span> Node Toolbar Icons</h4>
                <ul>
                  <li><code>│</code> — single daughter (Top-down) · single parent (Bottom-up)</li>
                  <li><code>⑃</code> — binary branching daughters (Top-down) · binary parent (Bottom-up)</li>
                  <li><code>→⑃</code> / <code>⑃←</code> — binary parent with new sibling on the left or right (Bottom-up only)</li>
                  <li><code>△</code> — triangle for unanalyzed constituents</li>
                  <li><code>+₂</code> — add a secondary label below the node (up to 4; node becomes terminal at 2+)</li>
                  <li><code>Ω</code> — open the special character picker (IPA, Greek, math symbols)</li>
                  <li><code>✕</code> — delete node and all its descendants (on root: clears tree, preserves root label)</li>
                </ul>
                <p style={{marginTop: '6px', fontSize: '11px', color: '#888'}}>Double-click any branch line to toggle dotted style.</p>
              </div>

              {/* ── Keyboard Shortcuts ── */}
              <div className="instruction-card">
                <h4><span className="icon">⌨</span> Keyboard Shortcuts</h4>
                <div style={{ display: 'flex', justifyContent: 'flex-start', gap: '40px' }}>
                  <ul className="shortcut-list" style={{ listStyle: 'none', padding: 0, margin: 0 }}>
                    <li style={{ marginBottom: '5px', opacity: 0.7, fontSize: '0.8em' }}>Windows / Linux</li>
                    <li><span className="key">Ctrl</span>+<span className="key">Z</span> Undo</li>
                    <li><span className="key">Ctrl</span>+<span className="key">Y</span> Redo</li>
                    <li><span className="key">Ctrl</span>+<span className="key">S</span> Save</li>
                    <li><span className="key">Ctrl</span>+<span className="key">+</span> Zoom in</li>
                    <li><span className="key">Ctrl</span>+<span className="key">−</span> Zoom out</li>
                    <li><span className="key">Ctrl</span>+<span className="key">0</span> Reset zoom</li>
                    <li><span className="key">Esc</span> Exit active mode</li>
                  </ul>
                  <ul className="shortcut-list" style={{ listStyle: 'none', padding: 0, margin: 0 }}>
                    <li style={{ marginBottom: '5px', opacity: 0.7, fontSize: '0.8em' }}>macOS</li>
                    <li><span className="key">⌘</span>+<span className="key">Z</span> Undo</li>
                    <li><span className="key">⌘</span>+<span className="key">Shift</span>+<span className="key">Z</span> Redo</li>
                    <li><span className="key">⌘</span>+<span className="key">S</span> Save</li>
                    <li><span className="key">⌘</span>+<span className="key">+</span> Zoom in</li>
                    <li><span className="key">⌘</span>+<span className="key">−</span> Zoom out</li>
                    <li><span className="key">⌘</span>+<span className="key">0</span> Reset zoom</li>
                    <li><span className="key">Esc</span> Exit active mode</li>
                  </ul>
                </div>
              </div>

            </div>
          )}
        </div>

          <footer className="footer">
            <p>Carlos González Vergara (<strong><a href="mailto:cgonzalv@uc.cl">cgonzalv@uc.cl</a></strong>)</p>
            <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/" target="_blank" rel="noopener noreferrer">
              <img src="https://mirrors.creativecommons.org/presskit/buttons/88x31/svg/by-nc-nd.svg" alt="CC BY-NC-ND 4.0" />
            </a>
          </footer>


        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<KilmerApp />);
  </script>

  <script>
    function syncCanvasHeight() {
      const panel = document.querySelector('.left-panel');
      const canvas = document.querySelector('.tree-canvas');
      if (!panel || !canvas) return;
      const h = panel.offsetHeight;
      canvas.style.minHeight = h + 'px';
    }
    // Run after React renders, then on every resize/DOM change
    setTimeout(syncCanvasHeight, 200);
    window.addEventListener('resize', syncCanvasHeight);
    const _obs = new MutationObserver(syncCanvasHeight);
    document.addEventListener('DOMContentLoaded', () => {
      const panel = document.querySelector('.left-panel');
      if (panel) _obs.observe(panel, { childList: true, subtree: true, attributes: true });
    });
    setInterval(syncCanvasHeight, 500);
  </script>
</body>
</html>
